<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staff Dashboard - Permission System</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#2563eb"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="PermissionApp"/>
  <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">🏫 Permission System</div>
    <div class="nav-user">
      <span id="navUserName"></span>
      <span class="role-badge staff-badge">Staff</span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="dashboard-container">
    <div class="dashboard-header">
      <h2>My Permission Requests</h2>
      <button class="btn-primary" onclick="openModal()">+ New Request</button>
    </div>

    <!-- Stats Cards -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">Total Requests</div>
      </div>
      <div class="stat-card pending">
        <div class="stat-num" id="statPending">0</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-card approved">
        <div class="stat-num" id="statApproved">0</div>
        <div class="stat-label">Approved</div>
      </div>
      <div class="stat-card rejected">
        <div class="stat-num" id="statRejected">0</div>
        <div class="stat-label">Rejected</div>
      </div>
    </div>

    <!-- Permissions List -->
    <div id="permissionsList" class="permissions-list">
      <div class="loading">Loading your requests...</div>
    </div>
  </div>

  <!-- New Permission Modal -->
  <div id="permissionModal" class="modal hidden">
    <div class="modal-overlay" onclick="closeModal()"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">New Permission Request</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <form id="permissionForm" onsubmit="submitPermission(event)">
        <input type="hidden" id="editPermissionId"/>
        <div class="form-group">
          <label>Permission Type</label>
          <select id="permType" required>
            <option value="">-- Select Type --</option>
            <option value="annual_leave">Annual Leave</option>
            <option value="sick_leave">Sick Leave</option>
            <option value="emergency_leave">Emergency Leave</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Start Date</label>
            <input type="date" id="permStartDate" required/>
          </div>
          <div class="form-group">
            <label>End Date</label>
            <input type="date" id="permEndDate" required/>
          </div>
        </div>
        <div class="form-group">
          <label>Reason / Description</label>
          <textarea id="permReason" rows="4" placeholder="Describe your reason for the permission request..." required></textarea>
        </div>
        <div id="permError" class="error-msg hidden"></div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-primary" id="submitPermBtn">Submit Request</button>
        </div>
      </form>
    </div>
  </div>

  <!-- View Details Modal -->
  <div id="detailModal" class="modal hidden">
    <div class="modal-overlay" onclick="closeDetailModal()"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>Permission Details</h3>
        <button class="modal-close" onclick="closeDetailModal()">✕</button>
      </div>
      <div id="detailContent"></div>
    </div>
  </div>

  <!-- PWA Install Banner -->
  <div id="installBanner" class="install-banner hidden">
    <div class="install-banner-text">
      <span class="icon">🏫</span>
      <div>
        <strong>Install Permission App</strong>
        <span>Add to your home screen for quick access</span>
      </div>
    </div>
    <div class="install-banner-actions">
      <button class="btn-dismiss" onclick="document.getElementById('installBanner').classList.add('hidden')">Not now</button>
      <button class="btn-install" onclick="installApp()">📲 Install</button>
    </div>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/staff.js"></script>
</body>
</html>
