<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staff Permission System</title>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#2563eb"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="PermissionApp"/>
  <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-header">
      <div class="logo">🏫</div>
      <h1>Staff Permission System</h1>
      <p>College Permission Management Portal</p>
    </div>

    <!-- Tab Switcher -->
    <div class="tab-switcher">
      <button class="tab-btn active" onclick="showTab('login')">Login</button>
      <button class="tab-btn" onclick="showTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <div id="login-tab" class="tab-content active">
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="loginEmail" placeholder="your@email.com" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" required/>
        </div>
        <div id="loginError" class="error-msg hidden"></div>
        <button type="submit" class="btn-primary" id="loginBtn">
          <span class="btn-text">Login</span>
          <span class="btn-loader hidden">Loading...</span>
        </button>
      </form>

     
    </div>

    <!-- Register Form -->
    <div id="register-tab" class="tab-content hidden">
      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="regName" placeholder="Your full name" required/>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="regEmail" placeholder="your@email.com" required/>
        </div>
        <div class="form-group">
          <label>Department</label>
          <select id="regDepartment" required>
            <option value="">-- Select Department --</option>
            <option value="Computer Science">Computer Science</option>
            <option value="Engineering">Engineering</option>
            <option value="Mathematics">Mathematics</option>
            <option value="Physics">Physics</option>
            <option value="Chemistry">Chemistry</option>
            <option value="Biology">Biology</option>
            <option value="Business">Business</option>
            <option value="Languages">Languages</option>
            <option value="Education">Education</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="Min 6 characters" required/>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="regConfirmPassword" placeholder="Repeat password" required/>
        </div>
        <div id="registerError" class="error-msg hidden"></div>
        <div id="registerSuccess" class="success-msg hidden"></div>
        <button type="submit" class="btn-primary" id="registerBtn">
          <span class="btn-text">Create Account</span>
          <span class="btn-loader hidden">Loading...</span>
        </button>
      </form>
    </div>
  </div>

  <!-- PWA Install Banner -->
  <div id="installBanner" class="install-banner hidden">
    <div class="install-banner-text">
      <span class="icon">🏫</span>
      <div>
        <strong>Install Permission App</strong>
        <span>Add to your home screen for quick access</span>
      </div>
    </div>
    <div class="install-banner-actions">
      <button class="btn-dismiss" onclick="document.getElementById('installBanner').classList.add('hidden')">Not now</button>
      <button class="btn-install" onclick="installApp()">📲 Install</button>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
